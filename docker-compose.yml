version: '3.8'

services:
  # MySQL for UserService
  mysql-db:
    image: mysql:8.0
    container_name: mysql-microservices
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: microservices
    volumes:
      - mysql_data:/var/lib/mysql

  # PostgreSQL for HotelService
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-microservices
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoteldba -d microservice"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MongoDB for RatingService
  mongodb:
    image: mongo:latest
    container_name: mongodb-microservices
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: microservices
    volumes:
      - mongo_data:/data/db

volumes:
  mysql_data:
  postgres_data:
  mongo_data:

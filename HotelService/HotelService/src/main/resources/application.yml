server:
  port: 8082


spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/postgres?connectTimeout=30&socketTimeout=30
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  application:
    name: HOTEL-SERVICE
  config:
    import: optional:configserver:http://localhost:8085

